<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento em análise – Soma Fácil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fffbf0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(255,200,87,0.15);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #b8860b; font-size: 1.6rem; margin-bottom: 8px; }
    p { color: #737b88; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #ff4d57;
      color: white;
      padding: 14px 32px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⏳</div>
    <h1>Pagamento em análise</h1>
    <p>Seu pagamento está sendo processado. Assim que for aprovado, seu acesso PRO será ativado automaticamente.</p>
    <a class="btn" href="somafacil://payment-pending">Voltar ao app</a>
  </div>
</body>
</html>
